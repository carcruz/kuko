body:
  - type: paragraph
    children:
      - text: >-
          Amsterdam tiene 800 kilómetros de ciclovías y el 63% de sus viajes
          diarios se realizan a pie o en bicicleta. Costa Rica tiene menos de
          100 kilómetros de infraestructura ciclista en todo el país, la mayoría
          discontinua e incompatible entre sí. ¿Qué es trasladable y qué no?
