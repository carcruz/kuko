title: '¿Qué son las Pruebas PISA y Por Qué Importan?'
status: published
contentType: analisis
excerpt: >-
  Desmitificamos las evaluaciones internacionales de educación y lo que
  realmente dicen sobre el sistema educativo costarricense.
publishedAt: '2024-11-20'
category: educacion
authors:
  - equipo-kuko
readingTimeMinutes: 10
body:
  - type: paragraph
    children:
      - text: >-
          Cada tres años, la OCDE publica los resultados del Programme for
          International Student Assessment (PISA), y cada vez el debate en
          Costa Rica sigue el mismo patrón: titulares alarmantes, declaraciones
          ministeriales, y poco análisis sobre qué miden realmente estas pruebas
          y qué no miden.
