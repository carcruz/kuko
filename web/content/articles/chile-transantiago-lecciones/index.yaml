title: 'Chile y su Transantiago: Lecciones para Costa Rica'
status: published
contentType: contexto
excerpt: >-
  ¿Qué podemos aprender de la mayor reforma de transporte público en la historia
  de Chile? Un análisis de viabilidad para Costa Rica.
publishedAt: '2024-12-20'
category: movilidad-transporte
authors:
  - equipo-kuko
readingTimeMinutes: 12
body:
  - type: paragraph
    children:
      - text: >-
          El Transantiago fue lanzado en 2007 como la reforma más ambiciosa de
          transporte urbano en la historia de Chile. Diez años después,
          Transantiago fue renombrado RED — y muchas de sus lecciones son
          directamente aplicables al contexto costarricense.
