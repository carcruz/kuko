title: 'Salario Mínimo: Historia, Impacto y Debate en CR'
status: published
contentType: analisis
excerpt: >-
  El sistema de salario mínimo costarricense en perspectiva regional y el debate
  técnico sobre su impacto en el empleo.
publishedAt: '2024-08-05'
category: economia-finanzas
authors:
  - equipo-kuko
readingTimeMinutes: 9
body:
  - type: paragraph
    children:
      - text: >-
          Costa Rica tiene uno de los sistemas de salario mínimo más complejos
          de América Latina: más de 400 categorías ocupacionales, cada una con
          su propio piso salarial. Un sistema diseñado para proteger a los
          trabajadores que, en la práctica, genera fricciones que pocos
          economistas defienden hoy.
