body:
  - type: paragraph
    children:
      - text: >-
          El déficit habitacional en la Gran Área Metropolitana de Costa Rica
          superó las 100,000 unidades en 2024, según datos del INEC y el BANHVI.
          Pero ese número esconde una realidad más compleja: no es solo falta de
          casas, es falta de casas en los lugares correctos, al precio correcto,
          para las familias que más las necesitan.
