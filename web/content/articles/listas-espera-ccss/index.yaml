readingTimeMinutes: 18
body:
  - type: paragraph
    children:
      - text: >-
          En 2020, la lista de espera quirúrgica de la CCSS contaba con 42,000
          personas. En 2025, esa cifra supera las 68,000. Un aumento del 68%
          en cinco años que no puede explicarse solo por el efecto pandemia.
