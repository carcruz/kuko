title: 'Listas de Espera CCSS: +68% en Cinco Años'
status: published
contentType: investigacion
excerpt: >-
  Las listas de espera quirúrgicas han aumentado de 42,000 a 68,000 personas
  desde 2020. Causas, comparación regional y opciones.
publishedAt: '2025-01-10'
category: salud-publica
authors:
