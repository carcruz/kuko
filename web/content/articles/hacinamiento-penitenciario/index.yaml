title: 'Hacinamiento Penitenciario: Más Allá de la Capacidad'
status: published
contentType: investigacion
excerpt: >-
  El 42% de hacinamiento en centros penales no es solo un problema de espacio.
  Reincidencia, factores de fondo y comparación regional.
