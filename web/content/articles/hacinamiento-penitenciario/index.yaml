body:
  - type: paragraph
    children:
      - text: >-
          El sistema penitenciario costarricense opera al 142% de su capacidad
          diseñada. El Centro de Atención Institucional La Reforma, el mayor del
          país, alberga más del doble de la población para la que fue construido.
          Pero el hacinamiento es síntoma, no causa.
