title: 'Brecha Digital en Costa Rica: ¿Quién queda afuera?'
status: published
contentType: datos
excerpt: >-
  El 28% de los hogares costarricenses no tienen acceso a internet de banda
  ancha. Los factores geográficos y económicos detrás.
publishedAt: '2024-09-20'
category: tecnologia-innovacion
authors:
  - equipo-kuko
readingTimeMinutes: 11
body:
  - type: paragraph
    children:
      - text: >-
          En 2023, el 72% de los hogares costarricenses tenía acceso a internet
          de banda ancha. El 28% restante no lo tenía. Detrás de ese porcentaje
          hay patrones claros de geografía, ingreso y edad que definen quién
          puede participar en la economía digital y quién no.
