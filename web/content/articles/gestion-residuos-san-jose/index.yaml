title: 'Gestión de Residuos en San José: El Problema que no Vemos'
status: published
contentType: investigacion
excerpt: >-
  El 34% de los residuos sólidos de San José no llegan a reciclaje. Qué hacen
  otras ciudades latinoamericanas.
publishedAt: '2024-11-05'
category: ambiente-sostenibilidad
authors:
  - equipo-kuko
readingTimeMinutes: 20
body:
  - type: paragraph
    children:
      - text: >-
          San José genera aproximadamente 1,400 toneladas de residuos sólidos
          por día. De ese total, solo el 66% llega a disposición final
          adecuada. El 34% restante termina en vertederos informales, ríos, o
          quema a cielo abierto.
