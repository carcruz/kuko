          Costa Rica ocupa el puesto 6 entre 12 países latinoamericanos en el
          Índice de Transparencia Fiscal del FMI. Por encima: Chile, Uruguay,
          Colombia, México y Perú. Por debajo: Guatemala, Honduras, Nicaragua,
          Bolivia y Venezuela. ¿Qué nos dice este ranking y qué no nos dice?
