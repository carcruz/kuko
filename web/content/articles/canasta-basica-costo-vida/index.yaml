title: 'Canasta Básica: Evolución del Costo de Vida 2020–2025'
status: published
contentType: datos
excerpt: >-
  Cinco años de datos sobre el costo de la canasta básica y su impacto
  diferenciado por nivel de ingreso y región.
publishedAt: '2024-12-10'
category: economia-finanzas
authors:
  - equipo-kuko
readingTimeMinutes: 8
body:
  - type: paragraph
    children:
      - text: >-
          Entre 2020 y 2025, la canasta básica alimentaria en Costa Rica
          aumentó un 34.3%, pasando de ₡108,390 a ₡145,600 mensuales. El
          salario mínimo creció un 26.1% en el mismo período, generando una
          brecha que afecta desproporcionadamente a los hogares de menores
          ingresos.
